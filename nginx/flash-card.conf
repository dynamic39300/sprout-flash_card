# nginx/flash-card.conf
# 放到 /etc/nginx/sites-available/flash-card.conf
# 然后 ln -s /etc/nginx/sites-available/flash-card.conf /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;   # 替换为你的域名或公网 IP

    # 强制 HTTPS（有域名后开启，先注释掉）
    # return 301 https://$host$request_uri;
}

# HTTPS（申请证书后取消注释）
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
#
#     # 其余配置同下
# }

server {
    listen 80;
    server_name your-domain.com;

    client_max_body_size 10M;

    # 上传的图片静态文件（直接由 Nginx 提供，绕过 Node）
    location /uploads/ {
        alias /home/ubuntu/flash_card/data/uploads/;  # 与 UPLOAD_DIR 一致
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理
    location /api/ {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 前端静态文件（SPA fallback）
    location / {
        root  /home/ubuntu/flash_card/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # HTML 不缓存（确保更新立即生效）
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 静态资源长缓存（Vite 自带 hash 文件名）
        location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
